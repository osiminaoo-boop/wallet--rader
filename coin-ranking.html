<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 大乱闘！アニマルブラザーズ — MAX上昇率ランキング</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=M+PLUS+1p:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #07090f;
  color: #fff;
  font-family: 'M PLUS 1p', sans-serif;
  min-height: 100vh;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(255,80,0,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 90%, rgba(255,200,0,0.05) 0%, transparent 60%);
  pointer-events:none;
}
header {
  text-align:center; padding:28px 20px 20px;
  border-bottom:2px solid #1a1a1a;
}
.title-fire {
  font-family:'Oswald',sans-serif;
  font-size:clamp(16px,4vw,30px); font-weight:700;
  color:#ff6a00; letter-spacing:2px;
  text-shadow:0 0 24px rgba(255,106,0,0.6); margin-bottom:4px;
}
.title-sub { font-size:12px; color:#666; font-weight:400; margin-bottom:14px; }
.base-tag {
  display:inline-block; background:#111;
  border:1px solid #222; border-left:3px solid #ff6a00;
  padding:6px 16px; font-size:11px; color:#888; font-weight:400;
}
.base-tag strong { color:#ff6a00; }
.live-row { margin-top:10px; font-size:11px; color:#444; font-weight:400; }
.live-dot {
  display:inline-block; width:6px; height:6px; border-radius:50%;
  background:#00ff88; box-shadow:0 0 6px #00ff88; margin-right:5px;
  animation:blink 1.4s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.summary-wrap {
max-width:960px; margin:20px auto 0; padding:0 16px;
display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
}
.sum-box { background:#0e1219; border:1px solid #1e2a3a; padding:14px 16px; text-align:center; }
.s-label { font-size:10px; color:#555; font-weight:400; margin-bottom:6px; letter-spacing:1px; }
.s-val { font-family:‘Oswald’,sans-serif; font-size:28px; font-weight:700; }
.s-val.gold  { color:#ffcc00; text-shadow:0 0 12px rgba(255,200,0,.5); }
.s-val.green { color:#00ff88; }
.s-val.red   { color:#ff3d71; }
.s-val.gray  { color:#444; }
.s-sub { font-size:11px; color:#555; margin-top:3px; font-weight:400; }

.ranking-wrap { max-width:960px; margin:20px auto 40px; padding:0 16px; }
.rank-header {
display:grid; grid-template-columns:56px 1fr 160px 160px;
gap:8px; padding:8px 14px;
font-size:10px; color:#333; font-weight:400;
border-bottom:1px solid #161616; letter-spacing:1px; text-transform:uppercase;
}
.rank-row {
display:grid; grid-template-columns:56px 1fr 160px 160px;
gap:8px; padding:18px 14px 10px;
border-bottom:1px solid #0f0f0f; align-items:center;
transition:background .2s; animation:rowIn .4s ease both;
}
@keyframes rowIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.rank-row:hover { background:rgba(255,255,255,0.02); }
.rank-row.rank-1 { background:rgba(255,200,0,0.05); border-left:3px solid #ffcc00; }
.rank-row.rank-2 { border-left:3px solid #999; }
.rank-row.rank-3 { border-left:3px solid #cd7f32; }

.rank-num {
font-family:‘Oswald’,sans-serif; font-size:22px; font-weight:700;
text-align:center; color:#282828; line-height:1;
}
.rank-1 .rank-num { color:#ffcc00; font-size:28px; }
.rank-2 .rank-num { color:#999; }
.rank-3 .rank-num { color:#cd7f32; }

.coin-sym  { font-family:‘Oswald’,sans-serif; font-size:19px; font-weight:600; color:#fff; line-height:1; }
.coin-name { font-size:11px; color:#555; margin-top:3px; font-weight:400; }
.coin-addr { font-size:9px; color:#222; margin-top:3px; font-weight:400; font-family:monospace; }

/* MC列 */
.mc-cell { text-align:right; }
.mc-now  { font-family:‘Oswald’,sans-serif; font-size:18px; font-weight:600; color:#ccc; line-height:1; }
.mc-base { font-size:10px; color:#333; margin-top:4px; font-weight:400; }

/* 上昇率列 */
.rate-cell { text-align:right; }
.max-rate {
font-family:‘Oswald’,sans-serif; font-size:34px; font-weight:700; line-height:1;
}
.max-rate.up   { color:#00ff88; text-shadow:0 0 16px rgba(0,255,136,.4); }
.max-rate.down { color:#ff3d71; }
.max-rate.flat { color:#333; }
.max-rate.load { color:#222; font-size:13px; font-weight:400; }
.now-rate { font-size:12px; margin-top:5px; font-weight:400; }
.now-rate.up   { color:#00bb66; }
.now-rate.down { color:#cc2255; }
.now-rate.flat { color:#333; }

/* バー */
.bar-full {
grid-column:1/-1; padding:2px 14px 6px 70px;
display:flex; gap:6px; align-items:center;
}
.bar-bg { flex:1; height:3px; background:#111; position:relative; overflow:hidden; }
.bar-max-fill,.bar-now-fill {
position:absolute; left:0; top:0; height:100%; transition:width 1s ease;
}
.bar-max-fill { opacity:.35; }
.bar-legend { font-size:8px; color:#222; font-weight:400; white-space:nowrap; }

.status-msg {
text-align:center; padding:50px 20px;
font-size:13px; font-weight:400; color:#555; line-height:2.5;
}

@media(max-width:600px){
.rank-header,.mc-cell,.bar-full { display:none; }
.rank-row { grid-template-columns:46px 1fr 130px; }
.max-rate { font-size:28px; }
}
</style>

</head>
<body>

<header>
  <div class="title-fire">🔥 押忍！雄⭐️祭 — 大乱闘！アニマルブラザーズ</div>
  <div class="title-sub">2次選考参戦ミーム一覧 · MAX上昇率ランキング</div>
  <div class="base-tag">起点MC: <strong>2025/3/8 00:09</strong> 確定値</div>
  <div class="live-row">
    <span class="live-dot"></span>
    <span id="apiLabel">接続中...</span> · 60秒自動更新 · <span id="updTime">取得中...</span>
  </div>
</header>

<div class="summary-wrap" id="summary">
  <div class="sum-box">
    <div class="s-label">🏆 最大上昇率 TOP</div>
    <div class="s-val gold" id="sBest">—</div>
    <div class="s-sub" id="sBestName"></div>
  </div>
  <div class="sum-box">
    <div class="s-label">📈 MAX 平均（全16コイン）</div>
    <div class="s-val gold" id="sAvgMax">—</div>
  </div>
  <div class="sum-box">
    <div class="s-label">⚡ 現在 平均</div>
    <div class="s-val green" id="sAvgNow">—</div>
  </div>
</div>

<div class="ranking-wrap">
  <div class="rank-header">
    <div>順位</div>
    <div>コイン</div>
    <div style="text-align:right">現在MC / 起点MC</div>
    <div style="text-align:right">最大上昇率 / 現在</div>
  </div>
  <div id="rankList">
    <div class="status-msg">価格データ取得中...</div>
  </div>
</div>

<script>
// 起点MC = 2025/3/8 00:09 時点の時価総額（USD）
const COINS = [
  { sym:"$OSUNEN",     name:"押燃",             addr:"5C7nFDCgWTLnHgszBd4ksmCak3nouFoMZ9sbAxkApump", baseMC:6700    },
  { sym:"$MAMBO",      name:"曼波",             addr:"AG5iXv6pFuQtszqcVzZatTiH3EM5LvUhm6WnP42Gpump", baseMC:49600   },
  { sym:"$OMOTENASHI", name:"OMOTENASHI",       addr:"Dir1edcUt6cT8AY35Tr96QaJwTeJJm6zuHnhVcA4pump", baseMC:15500   },
  { sym:"$NAMENEKO",   name:"NAMENEKO",         addr:"77Tp9C1wg7fXxNxYvEudMBs4X2Nve71Wrt1J8HxVpump", baseMC:13500   },
  { sym:"$GARYU",      name:"GARYU TIME",       addr:"3fDJJawU59fL1Mu8g23CsMt24SbKWtciQ1pVhtT1pump", baseMC:13600   },
  { sym:"$VT",         name:"VTuber meme coin", addr:"J3dGWsJwpPxKBYRCh44JFKc6eFMRp1JA6bRsxG2Tpump", baseMC:7600    },
  { sym:"$INMU",       name:"INMU COIN",        addr:"4FDtAagigMuFcPp36rbd9bzcYTJgQah2qLMYcYtfpump", baseMC:77200   },
  { sym:"$Zreal",      name:"Z李 REAL SUPER",   addr:"GnFMf6JVRhAqPbA9r8yW16xycynKNkXfbaYbusLEpump", baseMC:1660000 },
  { sym:"$81041",      name:"81041 COIN",       addr:"9SbNtqtnXbSGKvQv6G1XMzmoiEMNHoNWQNtMz7sbpump", baseMC:17180   },
  { sym:"$MISAKA",     name:"MISAKA",           addr:"4e2DhohUAJ9EbrLey3rVVgFQzLCAeeBirSbdhqrh9snX",  baseMC:76510   },
  { sym:"$YOP",        name:"Year Of Ponyta",   addr:"FG6jkQyxasn45vQGwpUCD3Kgv4mA5MLvUmYKauUmpump", baseMC:88930   },
  { sym:"$SHIRO",      name:"SHIRO",            addr:"FuJkw2vgov82x8DXbhPfmH6S6ZSJxvtjj1DQ7TsMpump", baseMC:8110    },
  { sym:"$SOLMYOJIN",  name:"SOL大明神",         addr:"EcNyJST9Q7nLWBjN6BB53hwBecmYgKy2UwHHC5TQpump", baseMC:9870    },
  { sym:"$TSUKY",      name:"Tsukuyomi",        addr:"KbRRK8YcPJfnB6SXo84F2BJwr8nVvzgG4BCWGwYpump",  baseMC:381.9  },
  { sym:"$ZOSS",       name:"ALL CHANCE",       addr:"DDpoM1KF4QYJww1qj7bTQFfFDF1KKQFbGozejjzcpump", baseMC:2900    },
  { sym:"$ANIMAL",     name:"SEXY ANIMAL COIN", addr:"8d4D4FGUrbtTDucywowRD4AnizRKCr1YZaYQ74bRpump", baseMC:300510  },
];

// nowMC: 現在のMC, maxMC: セッション中の最高MC
let nowMC = {};
let maxMC = {};

function applyMC(addr, mc) {
  if (!mc || isNaN(mc) || mc <= 0) return false;
  nowMC[addr] = mc;
  if (maxMC[addr] == null || mc > maxMC[addr]) maxMC[addr] = mc;
  return true;
}

// Jupiter: price × 1,000,000,000 = MC
async function fetchJupiter() {
  const ids = COINS.map(c => c.addr).join(',');
  const r = await fetch(`https://api.jup.ag/price/v2?ids=${ids}`);
  if (!r.ok) throw new Error('jupiter ' + r.status);
  const d = await r.json();
  if (!d.data) throw new Error('no data');
  let count = 0;
  COINS.forEach(c => {
    const p = parseFloat(d.data[c.addr]?.price);
    if (p > 0 && applyMC(c.addr, p * 1_000_000_000)) count++;
  });
  if (!count) throw new Error('0 prices');
  document.getElementById('apiLabel').textContent = `Jupiter API (${count}/${COINS.length}件)`;
  return count;
}

// GeckoTerminal: fdv_usd か price_usd×1B
async function fetchGecko() {
  const addrs = COINS.map(c => c.addr).join(',');
  const r = await fetch(
    `https://api.geckoterminal.com/api/v2/networks/solana/tokens/multi/${addrs}`,
    { headers:{ 'Accept':'application/json;version=20230302' } }
  );
  if (!r.ok) throw new Error('gecko ' + r.status);
  const d = await r.json();
  const items = d?.data;
  if (!Array.isArray(items) || !items.length) throw new Error('empty');
  let count = 0;
  items.forEach(item => {
    const attr = item?.attributes;
    const addr = attr?.address;
    const fdv   = parseFloat(attr?.fdv_usd);
    const price = parseFloat(attr?.price_usd);
    const mc = fdv > 0 ? fdv : price > 0 ? price * 1_000_000_000 : 0;
    if (addr && mc > 0) {
      const coin = COINS.find(c => c.addr.toLowerCase() === addr.toLowerCase());
      if (coin && applyMC(coin.addr, mc)) count++;
    }
  });
  if (!count) throw new Error('0 prices');
  document.getElementById('apiLabel').textContent = `GeckoTerminal (${count}/${COINS.length}件)`;
  return count;
}

// DexScreener: fdv か priceUsd×1B
async function fetchDex() {
  const addrs = COINS.map(c => c.addr).join(',');
  const r = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${addrs}`);
  if (!r.ok) throw new Error('dex ' + r.status);
  const d = await r.json();
  const pairs = d?.pairs || [];
  if (!pairs.length) throw new Error('no pairs');
  let count = 0;
  COINS.forEach(c => {
    const myPairs = pairs.filter(p =>
      p.baseToken?.address === c.addr || p.quoteToken?.address === c.addr
    );
    if (!myPairs.length) return;
    const best = myPairs.sort((a,b) => (b.liquidity?.usd||0)-(a.liquidity?.usd||0))[0];
    const fdv   = parseFloat(best.fdv);
    const price = parseFloat(best.priceUsd);
    const mc = fdv > 0 ? fdv : price > 0 ? price * 1_000_000_000 : 0;
    if (mc > 0 && applyMC(c.addr, mc)) count++;
  });
  if (!count) throw new Error('0 prices');
  document.getElementById('apiLabel').textContent = `DexScreener (${count}/${COINS.length}件)`;
  return count;
}

async function fetchAll() {
  for (const [name, fn] of [
    ['Jupiter', fetchJupiter],
    ['GeckoTerminal', fetchGecko],
    ['DexScreener', fetchDex],
  ]) {
    try {
      await fn();
      render();
      document.getElementById('updTime').textContent =
        new Date().toLocaleTimeString('ja-JP') + ' 更新';
      return;
    } catch(e) {
      console.warn(name + ' failed:', e.message);
    }
  }
  document.getElementById('rankList').innerHTML =
    `<div class="status-msg">⚠️ 価格データの取得に失敗しました<br>ページを再読み込みしてください</div>`;
}

function calcRate(baseMC, mc) {
  if (!baseMC || mc == null) return null;
  return (mc / baseMC - 1) * 100;
}
function fmt(r) {
  if (r == null) return null;
  return (r >= 0 ? '+' : '') + r.toFixed(1) + '%';
}
function fmtMC(v) {
  if (!v) return '—';
  if (v >= 1e9) return '$' + (v/1e9).toFixed(2) + 'B';
  if (v >= 1e6) return '$' + (v/1e6).toFixed(2) + 'M';
  if (v >= 1e3) return '$' + (v/1e3).toFixed(1) + 'K';
  return '$' + v.toFixed(0);
}

function render() {
  const sorted = COINS.map(c => ({
    ...c,
    maxRate: calcRate(c.baseMC, maxMC[c.addr]),
    nowRate: calcRate(c.baseMC, nowMC[c.addr]),
    nowMCval: nowMC[c.addr] || null,
    maxMCval: maxMC[c.addr] || null,
  })).sort((a,b) => {
    if (a.maxRate == null && b.maxRate == null) return 0;
    if (a.maxRate == null) return 1;
    if (b.maxRate == null) return -1;
    return b.maxRate - a.maxRate;
  });

  const validMax = sorted.filter(c => c.maxRate != null);
  const validNow = sorted.filter(c => c.nowRate != null);

  if (validMax.length) {
    const top = sorted[0];
    document.getElementById('sBest').textContent = fmt(top.maxRate) || '—';
    document.getElementById('sBestName').textContent = top.sym + ' · ' + top.name;
    const avgMax = validMax.reduce((a,c)=>a+c.maxRate,0)/validMax.length;
    document.getElementById('sAvgMax').textContent = fmt(avgMax) || '—';
    if (validNow.length) {
      const avgNow = validNow.reduce((a,c)=>a+c.nowRate,0)/validNow.length;
      const el = document.getElementById('sAvgNow');
      el.textContent = fmt(avgNow) || '—';
      el.className = 's-val ' + (avgNow >= 0 ? 'green' : 'red');
    }
  }

  const maxOfMax = Math.max(...sorted.map(c => Math.abs(c.maxRate||0)), 1);

  document.getElementById('rankList').innerHTML = sorted.map((c, i) => {
    const rank    = i + 1;
    const rankCls = rank <= 3 ? `rank-${rank}` : '';
    const maxText = c.maxRate != null ? fmt(c.maxRate) : 'NO DATA';
    const nowText = c.nowRate != null ? fmt(c.nowRate) : '—';
    const maxCls  = c.maxRate == null ? 'load' : c.maxRate > 0 ? 'up' : c.maxRate < 0 ? 'down' : 'flat';
    const nowCls  = c.nowRate == null ? 'flat' : c.nowRate > 0 ? 'up' : c.nowRate < 0 ? 'down' : 'flat';
    const barMaxW = c.maxRate != null ? Math.min(Math.abs(c.maxRate)/maxOfMax*100,100) : 0;
    const barNowW = c.nowRate != null ? Math.min(Math.max(c.nowRate/maxOfMax*100,0),100) : 0;
    const rankIcon = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':rank;
    const short = c.addr.slice(0,6)+'...'+c.addr.slice(-4);

    return `
    <div class="rank-row ${rankCls}" style="animation-delay:${i*.03}s">
      <div class="rank-num">${rankIcon}</div>
      <div>
        <div class="coin-sym">${c.sym}</div>
        <div class="coin-name">${c.name}</div>
        <div class="coin-addr">${short}</div>
      </div>
      <div class="mc-cell">
        <div class="mc-now">${fmtMC(c.nowMCval)}</div>
        <div class="mc-base">起点: ${fmtMC(c.baseMC)}</div>
      </div>
      <div class="rate-cell">
        <div class="max-rate ${maxCls}">${maxText}</div>
        <div class="now-rate ${nowCls}">現在 ${nowText}</div>
      </div>
      <div class="bar-full">
        <div class="bar-legend">MAX</div>
        <div class="bar-bg">
          <div class="bar-max-fill" style="width:${barMaxW}%;background:${c.maxRate>0?'#ffcc00':'#ff3d71'}"></div>
          <div class="bar-now-fill" style="width:${barNowW}%;background:${c.nowRate>0?'#00ff88':'#ff3d71'}"></div>
        </div>
        <div class="bar-legend">NOW</div>
      </div>
    </div>`;
  }).join('');
}

render();
fetchAll();
setInterval(fetchAll, 60000);
</script>

</body>
</html>
